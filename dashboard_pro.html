<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIGILANT - Aktivite İzleme Dashboardt</title>
    <script>
        // API tanımı HTML'de
        window.pendingRequests = {};
        window.requestIdCounter = 0;

        function sendRequest(type, extraData, fallback, timeoutMs) {
            return new Promise(function(resolve) {
                if (!window.chrome || !window.chrome.webview) {
                    console.error("❌ window.chrome.webview kullanılamıyor");
                    resolve(fallback);
                    return;
                }

                var requestId = ++window.requestIdCounter;
                var resolved = false;

                // Timeout - cevap gelmezse fallback dön
                var timer = setTimeout(function() {
                    if (!resolved) {
                        resolved = true;
                        delete window.pendingRequests[requestId];
                        console.warn("⏰ Request " + requestId + " (" + type + ") zaman aşımı!");
                        resolve(fallback);
                    }
                }, timeoutMs || 10000);

                window.pendingRequests[requestId] = function(response) {
                    if (!resolved) {
                        resolved = true;
                        clearTimeout(timer);
                        console.log("✅ Request " + requestId + " (" + type + ") cevap alındı");
                        resolve(response);
                    }
                };

                var msg = {type: type, requestId: requestId};
                if (extraData) {
                    for (var k in extraData) msg[k] = extraData[k];
                }
                console.log("📤 " + type + " isteniyor (requestId=" + requestId + ")");
                window.chrome.webview.postMessage(msg);
            });
        }

        // Genel mesaj handler - tüm cevapları işle
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', function(e) {
                console.log("📨 Mesaj alındı:", e.data);

                if (e.data && e.data.requestId && window.pendingRequests[e.data.requestId]) {
                    var callback = window.pendingRequests[e.data.requestId];
                    delete window.pendingRequests[e.data.requestId];
                    callback(e.data);
                } else {
                    console.warn("⚠️ Eşleşmeyen mesaj:", e.data);
                }
            });
            console.log("✅ WebView2 mesaj handler kuruldu");
        } else {
            console.warn("⚠️ window.chrome.webview bulunamadı - WebView2 dışında çalışıyor olabilir");
        }

        window.dashboardAPI = {
            getActivityLogs: function(limit) {
                return sendRequest('getActivityLogs', {limit: limit || 50}, {logs: []});
            },
            getProductivityData: function() {
                return sendRequest('getProductivityData', null, {metrics: {}});
            },
            categorizeWithAI: function() {
                return sendRequest('categorizeWithAI', null, {status: 'error'}, 30000);
            }
        };
        console.log("✅ Dashboard API başarıyla tanımlandı!");
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; overflow-y: auto; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 2px solid #38bdf8; padding-bottom: 15px; flex-wrap: wrap; gap: 15px; }
        h1 { font-size: 28px; color: #38bdf8; display: flex; align-items: center; gap: 10px; }
        .status-indicator { width: 10px; height: 10px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background: #0ea5e9; transform: translateY(-2px); }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #38bdf8; border-radius: 12px; padding: 20px; box-shadow: 0 8px 32px rgba(56, 189, 248, 0.1); transition: all 0.3s ease; }
        .metric-card:hover { transform: translateY(-5px); box-shadow: 0 12px 48px rgba(56, 189, 248, 0.2); border-color: #f59e0b; }
        .metric-label { color: #cbd5e1; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .metric-value { font-size: 32px; font-weight: bold; color: #38bdf8; margin-bottom: 5px; }
        .metric-card.warning .metric-value { color: #f59e0b; }
        .metric-subtitle { color: #64748b; font-size: 11px; }
        .section-title { font-size: 18px; color: #38bdf8; margin: 25px 0 15px 0; padding-bottom: 10px; border-bottom: 1px solid #38bdf8; display: flex; align-items: center; gap: 8px; }
        .activities-container { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #38bdf8; border-radius: 12px; padding: 20px; margin-bottom: 30px; max-height: 400px; overflow-y: auto; box-shadow: 0 8px 32px rgba(56, 189, 248, 0.1); }
        .activity-item { background: rgba(15, 23, 42, 0.8); border-left: 3px solid #38bdf8; padding: 12px; margin-bottom: 12px; border-radius: 6px; transition: all 0.2s ease; }
        .activity-item:hover { background: rgba(30, 41, 59, 0.9); border-left-color: #f59e0b; transform: translateX(5px); }
        .activity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .activity-process { font-weight: 600; color: #38bdf8; }
        .activity-duration { font-size: 12px; color: #64748b; }
        .activity-title { font-size: 13px; color: #cbd5e1; margin-bottom: 5px; word-break: break-word; }
        .activity-footer { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        .activity-category { background: rgba(56, 189, 248, 0.2); color: #38bdf8; padding: 3px 8px; border-radius: 4px; }
        .activity-category.warning { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        .empty-state-icon { font-size: 48px; margin-bottom: 15px; }
        .loading-state { text-align: center; padding: 40px; color: #64748b; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #38bdf8; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ai-section { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 2px solid #f59e0b; border-radius: 12px; padding: 20px; margin-bottom: 30px; box-shadow: 0 8px 32px rgba(245, 158, 11, 0.1); }
        .ai-section-title { color: #f59e0b; font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .ai-status { color: #cbd5e1; font-size: 13px; margin-bottom: 15px; }
        .ai-button { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .ai-button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3); }
        .ai-button:disabled { opacity: 0.6; cursor: not-allowed; }
        .refresh-info { color: #64748b; font-size: 12px; margin-top: 15px; display: flex; align-items: center; gap: 5px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }
        @media (max-width: 768px) { .container { padding: 10px; } h1 { font-size: 20px; } .metrics-grid { grid-template-columns: 1fr; } .activities-container { max-height: 300px; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1> <span class="status-indicator"></span> 📊 VIGILANT Dashboard </h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="refreshData()"> 🔄 Yenile </button>
            </div>
        </header>
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">Verimlilik</div>
                <div class="metric-value" id="productivity">--</div>
                <div class="metric-subtitle">Günlük ortalama</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Toplam Süre</div>
                <div class="metric-value" id="totalTime">--</div>
                <div class="metric-subtitle">Harcanan zaman</div>
            </div>
            <div class="metric-card warning">
                <div class="metric-label">Aktivite Sayısı</div>
                <div class="metric-value" id="activityCount">--</div>
                <div class="metric-subtitle">Son 24 saatte</div>
            </div>
        </div>
        <div class="section-title">📝 Son Aktiviteler</div>
        <div class="activities-container" id="activitiesList">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <span>⏳ Veriler yükleniyor...</span>
            </div>
        </div>
        <div class="ai-section">
            <div class="ai-section-title">🤖 Yapay Zeka ile Sınıflandırma</div>
            <div class="ai-status" id="aiStatus">
                Kategorize edilmemiş aktivitelerinizi AI ile sınıflandırabilirsiniz.
            </div>
            <button class="ai-button" id="aiButton" onclick="sendToAI()">
                🤖 Yapay Zeka ile Hüküm Ver
            </button>
            <div class="refresh-info">
                ⏱️ <span id="lastUpdate">Hazırlanıyor...</span>
            </div>
        </div>
    </div>
    <script>
        async function refreshData() {
            try {
                console.log("📊 Veri yenileniyor...");
                const logsResponse = await window.dashboardAPI.getActivityLogs(50);
                console.log("📋 Aktivite listesi:", logsResponse);
                updateActivityList(logsResponse);
                const productivityResponse = await window.dashboardAPI.getProductivityData();
                console.log("📈 Üretkenlik verisi:", productivityResponse);
                updateProductivityMetrics(productivityResponse);
                const now = new Date();
                document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('tr-TR');
            } catch (error) {
                console.error("❌ Veri yükleme hatası:", error);
            }
        }
        function updateActivityList(response) {
            const container = document.getElementById('activitiesList');
            if (!response || !response.logs || response.logs.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>Henüz aktivite yok</div>';
                document.getElementById('activityCount').textContent = '0';
                return;
            }
            let html = '';
            for (let i = 0; i < response.logs.length; i++) {
                const log = response.logs[i];
                const categoryClass = log.category && log.category.toLowerCase().includes('warning') ? 'warning' : '';
                html += `<div class="activity-item"><div class="activity-header"><span class="activity-process">${log.process || 'Bilinmiyor'}</span><span class="activity-duration">${log.duration ? Math.round(log.duration / 60) + ' dk' : '--'}</span></div><div class="activity-title">${log.title || '(Başlık yok)'}</div><div class="activity-footer"><span class="activity-category ${categoryClass}">${log.category || 'Kategorisiz'}</span><span style="color: #64748b;">#${i + 1}</span></div></div>`;
            }
            container.innerHTML = html;
            document.getElementById('activityCount').textContent = response.logs.length;
        }
        function updateProductivityMetrics(response) {
            if (response && response.metrics) {
                const productivity = response.metrics.productivity || 0;
                const totalTime = response.metrics.totalTime || 0;
                document.getElementById('productivity').textContent = Math.round(productivity) + '%';
                document.getElementById('totalTime').textContent = formatTime(totalTime);
            }
        }
        function formatTime(seconds) {
            if (seconds < 60) return seconds + 's';
            if (seconds < 3600) return Math.floor(seconds / 60) + ' dk';
            return Math.floor(seconds / 3600) + ' saat';
        }
        async function sendToAI() {
            const button = document.getElementById('aiButton');
            button.disabled = true;
            button.textContent = '⏳ İşleniyor...';
            try {
                console.log("🤖 AI kategorisine istek gönderiliyor...");
                const response = await window.dashboardAPI.categorizeWithAI();
                console.log("✅ AI cevabı:", response);
                document.getElementById('aiStatus').textContent = 'Kategorisyon tamamlandı!';
                setTimeout(refreshData, 1000);
            } catch (error) {
                console.error("❌ AI hatası:", error);
                document.getElementById('aiStatus').textContent = 'Hata oluştu!';
            } finally {
                button.disabled = false;
                button.textContent = '🤖 Yapay Zeka ile Hüküm Ver';
            }
        }
        var isRefreshing = false;
        async function safeRefresh() {
            if (isRefreshing) {
                console.log("⏭️ Önceki yenileme devam ediyor, atlanıyor...");
                return;
            }
            isRefreshing = true;
            try {
                await refreshData();
            } finally {
                isRefreshing = false;
            }
        }
        console.log("🚀 Dashboard başlatılıyor...");
        safeRefresh();
        setInterval(safeRefresh, 5000);
        console.log("✨ Dashboard tam olarak hazır!");
    </script>
</body>
</html>
