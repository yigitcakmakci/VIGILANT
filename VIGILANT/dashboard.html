<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIGILANT Dashboard</title>
    <!-- Chart.js will be loaded from CDN, but as fallback we'll show basic metrics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .metric {
            text-align: center;
            padding: 20px;
        }

        .metric-value {
            font-size: 3em;
            font-weight: bold;
            color: #2a5298;
            margin: 10px 0;
        }

        .metric-label {
            color: #666;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-unit {
            font-size: 0.5em;
            color: #999;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            transition: width 0.3s ease;
        }

        .logs-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .logs-container h2 {
            color: #2a5298;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2a5298;
        }

        .log-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 100px;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            align-items: center;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-process {
            font-weight: bold;
            color: #333;
        }

        .log-title {
            color: #666;
            font-size: 0.95em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .log-category {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .log-score {
            text-align: center;
            font-weight: bold;
            padding: 8px;
            border-radius: 8px;
        }

        .log-score.positive {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .log-score.negative {
            background: #ffcccc;
            color: #c62828;
        }

        .log-score.neutral {
            background: #f5f5f5;
            color: #616161;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .chart-card h3 {
            color: #2a5298;
            margin-bottom: 20px;
        }

        canvas {
            max-height: 300px;
        }

        .status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .log-item {
                grid-template-columns: 1fr;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .charts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="status"></div>
            <h1>📊 VIGILANT Dashboard</h1>
            <p>Gerçek zamanlı aktivite ve verimlilik takibi</p>
        </header>

        <div class="dashboard">
            <div class="card">
                <div class="metric">
                    <div class="metric-label">Günlük Verimlilik</div>
                    <div class="metric-value" id="productivity">0<span class="metric-unit">%</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="productivity-bar" style="width: 0%">0%</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="metric">
                    <div class="metric-label">Toplam Skor</div>
                    <div class="metric-value" id="totalScore">0</div>
                </div>
            </div>

            <div class="card">
                <div class="metric">
                    <div class="metric-label">Toplam Süre</div>
                    <div class="metric-value" id="totalDuration">0<span class="metric-unit">s</span></div>
                </div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-card">
                <h3>📈 Kategori Dağılımı (Süre)</h3>
                <canvas id="categoriesChart"></canvas>
            </div>

            <div class="chart-card">
                <h3>⏱️ Kategori Dağılımı (Puanlar)</h3>
                <canvas id="scoresChart"></canvas>
            </div>
        </div>

        <div class="logs-container">
            <h2>📋 Son Aktiviteler</h2>
            <div id="logs" class="logs-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>Henüz aktivite yok</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let categoriesChart = null;
        let scoresChart = null;

        // Sample data for fallback
        const sampleData = {
            productivity: 75.5,
            totalScore: 450,
            totalDuration: 3600,
            categories: {
                "Yazılım": 2000,
                "Eğlence": 1000,
                "Sosyal Medya": 600
            }
        };

        const sampleLogs = [
            { process: "devenv.exe", title: "Visual Studio - Project.cpp", category: "Yazılım", score: 10, duration: 1200 },
            { process: "Code.exe", title: "VS Code - main.cpp", category: "Yazılım", score: 10, duration: 900 },
            { process: "msedge.exe", title: "YouTube - Video", category: "Eğlence", score: -5, duration: 600 },
            { process: "discord.exe", title: "Discord Chat", category: "Sosyal Medya", score: -3, duration: 300 },
            { process: "devenv.exe", title: "Visual Studio - Debug", category: "Yazılım", score: 10, duration: 800 }
        ];

        async function updateDashboard() {
            try {
                let productivityData = sampleData;
                let logs = sampleLogs;

                // Try to use WebMessage API
                if (window.dashboardAPI) {
                    try {
                        productivityData = await window.dashboardAPI.getProductivityData();
                        if (typeof productivityData === 'string') {
                            productivityData = JSON.parse(productivityData);
                        }
                        console.log("Got productivity data from API:", productivityData);
                    } catch (e) {
                        console.log("API getProductivityData failed, using sample data:", e);
                    }

                    try {
                        logs = await window.dashboardAPI.getActivityLogs(50);
                        if (typeof logs === 'string') {
                            logs = JSON.parse(logs);
                        }
                        console.log("Got logs from API:", logs);
                    } catch (e) {
                        console.log("API getActivityLogs failed, using sample data:", e);
                    }
                } else {
                    console.log("Dashboard API not available, using sample data");
                }

                // Update metrics
                document.getElementById('productivity').textContent = Math.round(productivityData.productivity) + '%';
                document.getElementById('productivity-bar').textContent = Math.round(productivityData.productivity) + '%';
                document.getElementById('productivity-bar').style.width = productivityData.productivity + '%';
                document.getElementById('totalScore').textContent = Math.round(productivityData.totalScore);
                document.getElementById('totalDuration').textContent = Math.round(productivityData.totalDuration);

                // Update categories chart
                const categories = productivityData.categories;
                const labels = Object.keys(categories);
                const durations = Object.values(categories);

                if (categoriesChart) {
                    categoriesChart.data.labels = labels;
                    categoriesChart.data.datasets[0].data = durations;
                    categoriesChart.update();
                } else {
                    const ctx = document.getElementById('categoriesChart').getContext('2d');
                    categoriesChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: durations,
                                backgroundColor: [
                                    '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF',
                                    '#FF9F40', '#FF6384', '#C9CBCF'
                                ]
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: {
                                    position: 'bottom'
                                }
                            }
                        }
                    });
                }

                // Update logs
                const logsContainer = document.getElementById('logs');
                if (logs.length === 0) {
                    logsContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Henüz aktivite yok</p></div>';
                } else {
                    logsContainer.innerHTML = logs.map(log => {
                        const scoreClass = log.score > 0 ? 'positive' : (log.score < 0 ? 'negative' : 'neutral');
                        const duration = Math.round(log.duration / 60) + ' min';
                        return `
                            <div class="log-item">
                                <div class="log-process">🔹 ${log.process}</div>
                                <div class="log-title">${log.title || '(Başlık yok)'}</div>
                                <div class="log-category">${log.category}</div>
                                <div class="log-score ${scoreClass}">${log.score > 0 ? '+' : ''}${log.score}</div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Error updating dashboard:', error);
            }
        }

        // Initial load
        setTimeout(() => {
            updateDashboard();
        }, 100);

        // Update every 2 seconds
        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
