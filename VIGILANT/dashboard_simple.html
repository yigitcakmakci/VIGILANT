<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIGILANT Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .metric {
            text-align: center;
        }

        .metric-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #2a5298;
            margin: 10px 0;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 0.3s ease;
        }

        .logs-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .logs-container h2 {
            color: #2a5298;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .log-item {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr;
            gap: 15px;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.3s ease;
        }

        .log-item:hover {
            background: #f5f5f5;
        }

        .log-process {
            font-weight: bold;
            color: #2a5298;
        }

        .log-title {
            color: #666;
            word-break: break-word;
        }

        .log-category {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .log-score {
            text-align: center;
            font-weight: bold;
            padding: 8px;
            border-radius: 8px;
        }

        .log-score.positive {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .log-score.negative {
            background: #ffcccc;
            color: #c62828;
        }

        .log-score.neutral {
            background: #f5f5f5;
            color: #616161;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="status"></div>
            <h1>📊 VIGILANT Dashboard</h1>
            <p>Gerçek zamanlı aktivite ve verimlilik takibi</p>
        </header>

        <div class="dashboard">
            <div class="card">
                <div class="metric">
                    <div class="metric-label">Günlük Verimlilik</div>
                    <div class="metric-value" id="productivity">75%</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="productivity-bar" style="width: 75%">75%</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="metric">
                    <div class="metric-label">Toplam Skor</div>
                    <div class="metric-value" id="totalScore">450</div>
                </div>
            </div>

            <div class="card">
                <div class="metric">
                    <div class="metric-label">Toplam Süre</div>
                    <div class="metric-value" id="totalDuration">60 <span style="font-size: 0.5em;">min</span></div>
                </div>
            </div>
        </div>

        <div class="logs-container">
            <h2>📋 Son Aktiviteler</h2>
            <div id="logs" class="logs-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>Henüz aktivite yok. Veritabanından veriler yükleniyor...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log("Dashboard script loaded!");

        // Sample data for fallback
        const sampleLogs = [
            { process: "devenv.exe", title: "Visual Studio - Project.cpp", category: "Yazılım", score: 10, duration: 1200 },
            { process: "Code.exe", title: "VS Code - main.cpp", category: "Yazılım", score: 10, duration: 900 },
            { process: "msedge.exe", title: "YouTube - Video", category: "Eğlence", score: -5, duration: 600 },
            { process: "Slack.exe", title: "Slack - #general", category: "İş", score: 5, duration: 300 }
        ];

        function updateDashboard() {
            try {
                console.log("Updating dashboard...");
                const logsContainer = document.getElementById('logs');

                if (sampleLogs.length === 0) {
                    logsContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Henüz aktivite yok</p></div>';
                } else {
                    logsContainer.innerHTML = sampleLogs.map(log => {
                        const scoreClass = log.score > 0 ? 'positive' : (log.score < 0 ? 'negative' : 'neutral');
                        const duration = Math.round(log.duration / 60) + ' min';
                        return `
                            <div class="log-item">
                                <div class="log-process">${log.process}</div>
                                <div class="log-title">${log.title || '(Başlık yok)'}</div>
                                <div class="log-category">${log.category}</div>
                                <div class="log-score ${scoreClass}">${log.score > 0 ? '+' : ''}${log.score}</div>
                            </div>
                        `;
                    }).join('');
                }

                console.log("Dashboard updated successfully!");
            } catch (error) {
                console.error('Error updating dashboard:', error);
            }
        }

        // Initial load
        console.log("Initializing dashboard...");
        updateDashboard();
    </script>
</body>
</html>
